site_name: K Global Operations Manual
site_description: >-
  The K Global Knowledge Center — the internal operations manual for the
  K Global virtual airline. Company, network, fleet, business units, flight
  operations, events and comms.
site_author: K Global
# GitHub Pages project path. Update if a custom domain is configured.
site_url: https://k-global.github.io/operations/

# Fail the build on broken internal links / nav — enforced in CI too.
strict: true

# Internal notes / drafts that ship in the repo but are not manual pages.
exclude_docs: |
  assets/README.md

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - glightbox

nav:
  - Home: index.md
  - Getting Started: getting-started/index.md
  - Company: company/index.md
  - Network: network/index.md
  - Fleet: fleet/index.md
  - Business Units: business-units/index.md
  - Flight Ops: flight-ops/index.md
  - Events: events/index.md
  - Ops Comms: comms/index.md
  - Reference: reference/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/K-Global
      name: K Global on GitHub
  generator: false

copyright: >-
  K Global Operations Manual — operational reference for the K Global virtual
  airline, a fictional VATSIM VA. Sensitive material is kept off this site.
